services:
  # Backend Web Service on Render
  - type: web
    name: minierp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: minierp-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

  # Frontend Static Web App on Render
  - type: static
    name: minierp-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: minierp-backend
          property: url
          suffix: /api

databases:
  # Render Managed PostgreSQL Database Service
  - name: minierp-postgres
    databaseName: minierp
    user: minierp_user
    plan: free
